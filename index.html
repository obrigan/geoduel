<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoDuel 1v1: Final Fix</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="setup-overlay">
        <h1>GeoDuel 1v1</h1>
        <input type="text" id="nick-input" placeholder="Твой никнейм" maxlength="12" autocomplete="off">
        
        <div id="host-controls-ui" style="display: none;">
            <div class="url-box" id="game-url">Генерация ссылки...</div>
            <button id="btn-copy" class="menu-btn">СКОПИРОВАТЬ ССЫЛКУ</button>
            <button id="btn-start-game" class="menu-btn secondary-btn" disabled>ПЕРЕЙТИ К ИГРЕ</button>
        </div>

        <div id="guest-controls-ui" style="display: none;">
            <button id="btn-join-game" class="menu-btn" onclick="joinDuel()">ПРИСОЕДИНИТЬСЯ</button>
        </div>
        
        <p id="network-status" style="color: #f1c40f; margin-top: 15px;">СЕТЬ: Инициализация...</p>
        <p id="debug-info" style="color: #555; font-size: 10px; margin-top: 5px;"></p>
    </div>

    <div id="main-game-container" style="display: none;">
        <div id="ui-layer">
            <h1 id="timer-header">Время: <span id="timer-val">90</span></h1>
            <div id="game-info">
                <span id="name-me">Я</span> 
                <span id="score-board"><span id="score-me">0</span> : <span id="score-opp">0</span></span>
                <span id="name-opp">Соперник</span>
            </div>
            <div id="status">Ожидание...</div>
        </div>

        <div class="section-wrapper">
            <div id="prep-screen" class="prep-container active">
                <h2>Раунд <span id="round-num">1</span></h2>
                <div class="map-container">
                    <img id="map-preview" src="" alt="Карта">
                </div>
                <button id="ready-btn" onclick="setReady()">ГОТОВ!</button>
                <p id="ready-status">Ждем готовности...</p>
            </div>

            <div id="round-screen">
                <div id="game-grid">
                    <div class="option" onclick="sendChoice(0)"><img id="img0" src=""></div>
                    <div class="option" onclick="sendChoice(1)"><img id="img1" src=""></div>
                    <div class="option" onclick="sendChoice(2)"><img id="img2" src=""></div>
                    <div class="option" onclick="sendChoice(3)"><img id="img3" src=""></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
