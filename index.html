<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoDuel 1v1: Firebase Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <div id="setup-overlay">
        <h1>GeoDuel 1v1</h1>
        <input type="text" id="nick-input" placeholder="Твой никнейм" maxlength="12">
        
        <div id="menu-initial">
            <button class="menu-btn" onclick="createRoom()">СОЗДАТЬ ЛОББИ</button>
            <div style="margin: 15px 0; color: #555;">ИЛИ</div>
            <input type="text" id="room-input" placeholder="Код комнаты" class="code-input">
            <button class="menu-btn secondary-btn" onclick="joinRoom()">ЗАЙТИ ПО КОДУ</button>
        </div>

        <div id="lobby-panel" style="display: none;">
            <div class="url-box">КОД КОМНАТЫ: <b id="display-room-code">...</b></div>
            <div id="lobby-status">Ждем соперника...</div>
            <button id="btn-start" class="menu-btn" style="display: none;" onclick="startGame()">НАЧАТЬ ДУЭЛЬ</button>
        </div>
    </div>

    <div id="main-game-container" style="display: none;">
        <div id="ui-layer">
            <h1 id="timer-header">Время: <span id="timer-val">90</span></h1>
            <div id="game-info">
                <span id="name-me" class="p-name">Я</span> 
                <span id="score-board"><span id="score-me">0</span> : <span id="score-opp">0</span></span>
                <span id="name-opp" class="p-name">Соперник</span>
            </div>
            <div id="status">Дуэль начинается...</div>
        </div>

        <div class="section-wrapper">
            <div id="prep-screen" class="prep-container">
                <h2>Раунд <span id="round-num">1</span></h2>
                <div class="map-container">
                    <img id="map-preview" src="" alt="Карта">
                </div>
                <button id="ready-btn" class="menu-btn" onclick="setReady()">ГОТОВ!</button>
                <p id="ready-status">Нажми "Готов", чтобы начать</p>
            </div>

            <div id="round-screen" style="display: none;">
                <div id="game-grid">
                    <div class="option" onclick="selectChoice(0)"><img id="img0" src=""></div>
                    <div class="option" onclick="selectChoice(1)"><img id="img1" src=""></div>
                    <div class="option" onclick="selectChoice(2)"><img id="img2" src=""></div>
                    <div class="option" onclick="selectChoice(3)"><img id="img3" src=""></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
