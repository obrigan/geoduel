<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoDuel 1v1</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="main-game-container" style="display: none;">
        <div id="ui-layer">
            <h1 id="timer-header">Время: <span id="timer-val">90</span></h1>
            <div id="game-info">
                <span id="name-me">Я</span> 
                <span id="score-board"><span id="score-me">0</span> : <span id="score-opp">0</span></span>
                <span id="name-opp">Соперник</span>
            </div>
            <div id="status">Ожидание...</div>
        </div>

        <div class="section-wrapper">
            <div id="prep-screen" class="prep-container active">
                <h2 id="round-title">Раунд <span id="round-num">1</span></h2>
                <div class="map-container">
                    <img id="map-preview" src="images/map1.jpg" alt="Карта">
                </div>
                <button id="ready-btn" onclick="setReady()">ГОТОВ!</button>
                <p id="ready-status">Ждем готовности игроков...</p>
            </div>

            <div id="game-grid-container" style="display:contents;">
                <div id="powerups-panel" style="display: none;">
                    <div class="powerup-btn" id="btn-5050" onclick="use5050()">
                        <span class="powerup-icon">🌗</span>
                        <span class="powerup-text">50/50</span>
                    </div>
                    <div class="powerup-btn" id="btn-time" onclick="useTimeBoost()">
                        <span class="powerup-icon">⏱️</span>
                        <span class="powerup-text">+30 СЕК</span>
                    </div>
                </div>

                <div id="game-grid">
                    <div class="option" onclick="sendChoice(0)"><img id="img0" src=""></div>
                    <div class="option" onclick="sendChoice(1)"><img id="img1" src=""></div>
                    <div class="option" onclick="sendChoice(2)"><img id="img2" src=""></div>
                    <div class="option" onclick="sendChoice(3)"><img id="img3" src=""></div>
                </div>
            </div>

            <div id="results-screen" class="prep-container">
                <h1 id="results-title" style="color:#e0e0e0; font-size: 50px; margin-bottom: 30px;">ИТОГИ</h1>
                <div class="winner-display">
                    <span class="trophy-icon">🏆</span>
                    <div id="winner-circle-element" class="winner-circle">
                        <span id="winner-name">Никнейм</span>
                    </div>
                    <span class="trophy-icon">🏆</span>
                </div>
                <div id="final-scores" style="font-size: 32px; font-family: monospace; color: white; margin: 10px 0;"></div>
                <button class="menu-btn" style="margin-top: 30px;" onclick="location.reload()">ИГРАТЬ ЕЩЕ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
