<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoDuel 1v1</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="main-game-container" style="display: none;">
        <div id="ui-layer">
            <h1 id="timer-header">Время: <span id="timer-val">90</span></h1>
            <div id="game-info">
                Раунд: <span id="round-num">1</span>/2 | 
                Счёт: <span id="score-me">0</span> - <span id="score-opp">0</span>
            </div>
            <div id="status">Ожидание соперника...</div>
        </div>

        <div id="prep-screen" class="prep-container">
            <h2>Где эта точка?</h2>
            <div class="map-container">
                <img id="map-preview" src="images/map1.jpg" alt="Карта">
            </div>
            <button id="ready-btn" onclick="setReady()">ГОТОВ!</button>
            <p id="ready-status">Ждем готовности игроков...</p>
        </div>

        <div id="game-grid" style="display: none;">
            <div class="option" onclick="sendChoice(0)"><img id="img0" src=""></div>
            <div class="option" onclick="sendChoice(1)"><img id="img1" src=""></div>
            <div class="option" onclick="sendChoice(2)"><img id="img2" src=""></div>
            <div class="option" onclick="sendChoice(3)"><img id="img3" src=""></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
