<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoDuel 1v1: Pro Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <div id="image-modal" onclick="closeImage()">
        <img id="modal-img" src="" alt="Full view">
    </div>

    <div id="setup-overlay">
        <h1 class="logo">GeoDuel <span>1v1</span></h1>
        <input type="text" id="nick-input" placeholder="Твой никнейм" maxlength="12">
        
        <div id="menu-initial">
            <button class="menu-btn main-btn" onclick="createRoom()">СОЗДАТЬ ЛОББИ</button>
            <div class="divider">ИЛИ</div>
            <input type="text" id="room-input" placeholder="Код комнаты" class="code-input">
            <button class="menu-btn secondary-btn" onclick="joinRoom()">ЗАЙТИ ПО КОДУ</button>
        </div>

        <div id="lobby-panel" style="display: none;">
            <div class="url-box">КОД КОМНАТЫ: <span id="display-room-code">...</span></div>
            <div id="lobby-status">Подключение к серверу...</div>
            <button id="btn-start" class="menu-btn start-btn" style="display: none;" onclick="startGame()">НАЧАТЬ ДУЭЛЬ</button>
        </div>
    </div>

    <div id="main-game-container" style="display: none;">
        <div id="ui-layer">
            <h1 id="timer-header">Время: <span id="timer-val">90</span></h1>
            <div id="game-info">
                <div class="player p-left">
                    <span id="name-me">Я</span>
                    <span id="score-me" class="score">0</span>
                </div>
                <div class="score-divider">:</div>
                <div class="player p-right">
                    <span id="score-opp" class="score">0</span>
                    <span id="name-opp">Соперник</span>
                </div>
            </div>
            <div id="status-label">Дуэль начинается...</div>
        </div>

        <div class="section-wrapper">
            <div id="prep-screen" class="prep-container">
                <h2 class="round-title">Раунд <span id="round-num">1</span></h2>
                <div class="map-card" onclick="zoomImage(this.querySelector('img').src)">
                    <img id="map-preview" src="" alt="Карта">
                    <div class="zoom-hint">Нажми, чтобы увеличить</div>
                </div>
                <button id="ready-btn" class="ready-btn" onclick="setReady()">Я ГОТОВ!</button>
                <p id="ready-status">Ждем готовности обоих игроков</p>
            </div>

            <div id="round-screen" style="display: none;">
                <div id="game-grid">
                    <div class="option-card" onclick="selectChoice(0)">
                        <img id="img0" src="">
                        <div class="zoom-btn" onclick="event.stopPropagation(); zoomImage(this.parentElement.querySelector('img').src)">🔍</div>
                    </div>
                    <div class="option-card" onclick="selectChoice(1)">
                        <img id="img1" src="">
                        <div class="zoom-btn" onclick="event.stopPropagation(); zoomImage(this.parentElement.querySelector('img').src)">🔍</div>
                    </div>
                    <div class="option-card" onclick="selectChoice(2)">
                        <img id="img2" src="">
                        <div class="zoom-btn" onclick="event.stopPropagation(); zoomImage(this.parentElement.querySelector('img').src)">🔍</div>
                    </div>
                    <div class="option-card" onclick="selectChoice(3)">
                        <img id="img3" src="">
                        <div class="zoom-btn" onclick="event.stopPropagation(); zoomImage(this.parentElement.querySelector('img').src)">🔍</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
