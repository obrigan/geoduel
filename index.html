<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoDuel 1v1: Ultimate</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <div id="screen-setup" class="screen-container active">
        <h1 class="main-title">GeoDuel <span>1v1</span></h1>
        
        <div id="setup-controls" class="centered-flex">
            <input type="text" id="nick-input" class="custom-input" placeholder="Твой никнейм" maxlength="12" autocomplete="off">
            <button class="btn btn-primary" onclick="createRoom()">СОЗДАТЬ ЛОББИ</button>
            
            <div class="divider">или</div>
            
            <div class="join-row">
                <input type="text" id="room-input" class="custom-input small-input" placeholder="Код комнаты" autocomplete="off">
                <button class="btn btn-secondary" onclick="joinRoom()">ВОЙТИ</button>
            </div>
        </div>

        <div id="lobby-controls" class="centered-flex" style="display: none;">
            <div class="room-code-display">КОД КОМНАТЫ: <span id="display-room-code">...</span></div>
            <div id="lobby-status" class="status-text">Игроков: 1/2</div>
            <button id="btn-start" class="btn btn-success" style="display: none;" onclick="startGame()">НАЧАТЬ ДУЭЛЬ</button>
        </div>
    </div>

    <div id="screen-game" class="screen-container" style="display: none;">
        
        <header id="game-header">
            <div class="timer-box">Время: <span id="timer-val" class="timer-number">90</span></div>
            <div class="scoreboard">
                <div class="player-info left">
                    <span id="name-me" class="player-name">Я</span>
                    <span id="score-me" class="score-badge">0</span>
                </div>
                <div class="score-colon">:</div>
                <div class="player-info right">
                    <span id="score-opp" class="score-badge">0</span>
                    <span id="name-opp" class="player-name">Соперник</span>
                </div>
            </div>
            <div id="game-status" class="status-text">Ожидание...</div>
        </header>

        <main id="phase-prep" class="phase-container">
            <h2 class="round-title">Раунд <span id="round-num">1</span> из 8</h2>
            <div class="map-wrapper">
                <img id="map-preview" src="" alt="Карта задания">
            </div>
            <button id="ready-btn" class="btn btn-primary large-btn" onclick="setReady()">Я ГОТОВ!</button>
        </main>

        <main id="phase-cards" class="phase-container" style="display: none;">
            <div class="powerups-container">
                <button class="powerup-btn" id="btn-5050" onclick="use5050()">
                    <span class="p-icon">🌗</span> 50/50
                </button>
                <button class="powerup-btn" id="btn-time" onclick="useTimeBoost()">
                    <span class="p-icon">⏱️</span> +30 СЕК
                </button>
            </div>

            <div class="cards-grid">
                <div class="card-item" onclick="openZoom(0)"><img id="img0" src=""></div>
                <div class="card-item" onclick="openZoom(1)"><img id="img1" src=""></div>
                <div class="card-item" onclick="openZoom(2)"><img id="img2" src=""></div>
                <div class="card-item" onclick="openZoom(3)"><img id="img3" src=""></div>
            </div>
        </main>

        <main id="phase-results" class="phase-container" style="display: none;">
            <h1 class="victory-title">ИТОГИ ДУЭЛИ</h1>
            <div class="winner-box">
                <span class="trophy">🏆</span>
                <div id="winner-circle">
                    <span id="winner-name">Никнейм</span>
                </div>
                <span class="trophy">🏆</span>
            </div>
            <div id="final-scores" class="final-score-text">0 : 0</div>
            <button class="btn btn-primary" style="margin-top: 40px;" onclick="location.reload()">СЫГРАТЬ ЕЩЕ РАЗ</button>
        </main>
    </div>

    <div id="zoom-modal" class="modal-overlay" style="display: none;" onclick="closeZoom(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="zoomed-image" src="" alt="Увеличенное фото">
            <button id="confirm-btn" class="btn btn-danger huge-btn" onclick="confirmChoice()">ОТВЕТИТЬ!</button>
            <div class="close-hint" onclick="closeZoom(event)">нажать сюда, чтобы вернуться к выбору</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
