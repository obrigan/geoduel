<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoZoom Duel: Firebase Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <div id="setup-overlay">
        <h1>GeoZoom Duel</h1>
        <input type="text" id="nick-input" placeholder="Твой никнейм" maxlength="12">
        
        <div id="start-menu">
            <button class="menu-btn" onclick="createRoom()">СОЗДАТЬ ЛОББИ</button>
            <div style="margin: 15px 0; color: #555;">ИЛИ</div>
            <input type="text" id="room-input" placeholder="Код комнаты (4 цифры)" style="padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; text-align: center; margin-bottom: 10px;">
            <button class="menu-btn secondary-btn" onclick="joinRoom()">ЗАЙТИ ПО КОДУ</button>
        </div>

        <div id="lobby-panel" style="display: none;">
            <div class="url-box">КОД КОМНАТЫ: <b id="display-room-code" style="color: #3498db; font-size: 24px;">...</b></div>
            <div id="lobby-status" style="margin: 20px 0; font-weight: bold; color: #f1c40f;">Ждем игроков...</div>
            <button id="btn-start" class="menu-btn" style="display: none;" onclick="startGame()">НАЧАТЬ ИГРУ</button>
        </div>
    </div>

    <div id="main-game-container" style="display: none;">
        <div id="game-info">
            <span id="p1-name" class="player-label">...</span> 
            <span id="score-val">0 : 0</span> 
            <span id="p2-name" class="player-label">...</span>
        </div>
        <h2 id="status-text">Раунд 1</h2>
        
        <div id="map-wrapper">
            <div id="map"></div>
            <div id="map-overlay" style="display: none;">
                <h1 id="overlay-text">ОТВЕТ!</h1>
            </div>
        </div>

        <div id="controls">
            <button id="btn-buzz" class="buzz-btn" onclick="pressBuzzer()">ОТВЕТИТЬ!</button>
            
            <div id="host-controls" style="display: none;">
                <p style="font-size: 20px;">Верный ответ: <b id="host-answer" style="color: #2ecc71; text-transform: uppercase;">...</b></p>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="judge-btn ok" onclick="judge(true)">ВЕРНО (+100)</button>
                    <button class="judge-btn no" onclick="judge(false)">МИМО (-100)</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
